<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width,initial-scale=1">
	<title>EloCalc</title>
	<style>
		:root {
			--primary: #005dac;
			--on-primary: #ffffff;
			--hover: #00539a;
			--background: #f9f9ff;
			--surface: #ffffff;
			--text: #181c21;
			--border: #c1c6d4;
			--muted: #f2f3fc;
			--success: #0b6b1d;
			--on-success: #ffffff;
			--danger: #ba1a1a;
			--on-danger: #ffffff;
			--highlight-bg: #d4e3ff;
		}
		@media (prefers-color-scheme: dark) {
			:root:not(.light) {
				--primary: #a5c8ff;
				--on-primary: #00315f;
				--hover: #72adff;
				--background: #101319;
				--surface: #0b0e14;
				--text: #e0e2ea;
				--border: #414752;
				--muted: #181c21;
				--success: #82db7e;
				--on-success: #00390a;
				--danger: #ffb4ab;
				--on-danger: #93000a;
				--highlight-bg: #001c3a;
			}
		}
		:root.dark {
			--primary: #a5c8ff;
			--on-primary: #00315f;
			--hover: #72adff;
			--background: #101319;
			--surface: #0b0e14;
			--text: #e0e2ea;
			--border: #414752;
			--muted: #181c21;
			--success: #82db7e;
			--on-success: #00390a;
			--danger: #ffb4ab;
			--on-danger: #93000a;
			--highlight-bg: #001c3a;
		}
		* { 
			box-sizing: border-box; 
			margin: 0; 
			padding: 0; 
			outline-offset: 2px; 
		}
		*:focus-visible { 
			outline: 2px solid var(--primary); 
		}
		body {
			background: var(--background);
			color: var(--text);
			font-family: sans-serif;
			display: flex;
			justify-content: center;
			min-height: 100vh;
			padding: 1rem;
		}
		.container {
			background: var(--surface);
			border: 1px solid var(--border);
			border-radius: 8px;
			max-width: 960px;
			padding: 2rem;
			width: 100%;
			position: relative;
			margin: 2rem 0;
		}
		.hidden { 
			display: none !important; 
		}
		h1, h2, h3, label { 
			margin: .5rem 0; 
		}
		label { 
			display: block; 
			font-weight: 700; 
		}
		input, select, button {
			background: var(--surface);
			border: 1px solid var(--border);
			border-radius: 4px;
			color: var(--text);
			font-size: 1rem;
			padding: .5rem;
			width: 100%;
		}
		button { 
			cursor: pointer; 
		}
		button:disabled { 
			opacity: .6; 
			cursor: not-allowed; 
		}
		.primary { 
			background: var(--primary); 
			color: var(--on-primary); 
			border: 0; 
		}
		.primary:hover:not(:disabled) { 
			background: var(--hover); 
		}
		.secondary:hover:not(:disabled) { 
			background: var(--muted); 
		}
		.danger, .success { 
			color: var(--on-danger); 
			border: 0; 
			background: var(--danger); 
		}
		.success { 
			background: var(--success); 
			color: var(--on-success); 
		}
		.danger:hover, .success:hover { 
			filter: brightness(.9); 
		}
		.selectors {
			position: absolute;
			right: 2rem;
			top: 1rem;
			display: flex;
			gap: 8px;
		}
		.selectors select { 
			width: auto; 
			font-size: .9rem; 
		}
		.mode-elo .win-input, .mode-elo .tie-input, .mode-elo #headWin, .mode-elo #headTie, .mode-elo #allowTies, .mode-elo #allowTiesLabel, .mode-elo .group { 
			display: none !important; 
		}
		.mode-win #normalizeElo, .mode-win #normalizeEloLabel { 
			display: none !important; 
		}
		.mode-elo #anchorMain, .mode-elo #anchorMainLabel {
			display: none !important;
		}
		.mode-win .elo-input, .mode-win #mainElo, .mode-win #headElo { 
			display: none !important; 
		}
		#mainElo { 
			margin-top: 0.5rem; 
		}
		.row { 
			display: flex; 
			gap: 1rem; 
			margin-bottom: 1rem; 
		}
		.group { 
			flex: 1; 
		}
		.competitor-row { 
			display: flex; 
			gap: .5rem; 
			align-items: center; 
			margin-bottom: .5rem; 
		}
		.competitor-row input[type=text] { 
			flex: 2; 
		}
		.competitor-row input[type=number] { 
			flex: 1; 
		}
		.competitor-row button { 
			width: auto; 
			padding: .5rem 1rem; 
		}
		table { 
			border-collapse: collapse; 
			margin-top: 1rem; 
			width: 100%; 
			font-size: .9rem; 
		}
		th, td { 
			border: 1px solid var(--border); 
			padding: .5rem; 
			text-align: left; 
		}
		th { 
			background: var(--primary); 
			color: var(--on-primary); 
			position: sticky; 
			top: 0; 
			z-index: 5; 
			cursor: pointer; 
			user-select: none; 
		}
		th:hover { 
			background: var(--hover); 
		}
		th::after { 
			content: ''; 
			display: inline-block; 
			margin-left: 5px; 
			width: 0.8em; 
			opacity: 0.7; 
		}
		th.sort-asc::after { 
			content: '▲'; 
		}
		th.sort-desc::after { 
			content: '▼'; 
		}
		.error { 
			color: var(--danger); 
			font-size: .9rem; 
			margin: 1rem 0; 
			display: block; 
			font-weight: 500; 
		}
		.info { 
			font-size: .9rem; 
			opacity: .8; 
			line-height: 1.6; 
			margin-bottom: 1rem; 
		}
		.bar-container { 
			background: var(--muted); 
			border-radius: 4px; 
			height: 8px; 
			min-width: 80px; 
			width: 100%; 
			overflow: hidden; 
		}
		.bar { 
			background: var(--primary); 
			height: 100%; 
		}
		.actions { 
			display: flex; 
			gap: 1rem; 
			margin-top: 1rem; 
		}
		.table-wrapper { 
			overflow-x: auto; 
			-webkit-overflow-scrolling: touch; 
			max-height: 70vh; 
			overflow-y: auto; 
			border-bottom: 1px solid var(--border); 
		}
		.highlight { 
			background-color: var(--highlight-bg); 
		}
		.avg-highlight { 
			outline: 2px dashed var(--primary); 
			outline-offset: -2px; 
		}
		input:out-of-range, .invalid { 
			border-color: var(--danger); 
			background-color: var(--background); 
		}
		#listHeaders { 
			position: sticky; 
			top: 0; 
			z-index: 10; 
			background: var(--surface); 
			padding: .75rem 0; 
			border-bottom: 1px solid var(--border); 
			margin-bottom: .5rem; 
		}
		.options-row { 
			align-items: center; 
			margin-top: 1rem; 
			gap: .5rem; 
		}
		#allowTies, #anchorMain, #normalizeElo {
			width: auto; 
		}
		#allowTiesLabel, #anchorMainLabel, #normalizeEloLabel {
			margin: 0; 
		}
		#competitorsHeader { 
			margin-top: 1.5rem; 
		}
		#headName { 
			flex: 2; 
			font-size: .85rem; 
			opacity: .8; 
		}
		#headWin, #headTie, #headElo { 
			flex: 1; 
			font-size: .85rem; 
			opacity: .8; 
		}
		.hidden-btn { 
			visibility: hidden; 
			cursor: default; 
		}
		#list { 
			margin-bottom: 1rem; 
		}
		.controls-row { 
			gap: .5rem; 
		}
		#add, #clear, #import, #edit, #copy, #export { 
			flex: 1; 
		}
		@media(max-width: 768px) {
			.selectors { 
				position: static; 
				justify-content: end; 
				margin-bottom: .5rem; 
			}
			.row { 
				flex-direction: column; 
			}
		}
	</style>
</head>
<body>
	<div class="container">
		<div class="selectors">
			<select id="mode"></select>
			<select id="language"></select>
			<select id="theme"><option value="auto"></option><option value="light"></option><option value="dark"></option></select>
		</div>
		<h1 id="title"></h1>
		<p id="subtitle" class="info"></p>
		<div id="input">
			<div class="group">
				<label id="mainLabel" for="mainName"></label>
				<input type="text" id="mainName" value="Player A">
				<input type="number" id="mainElo" placeholder="Elo" class="elo-input">
			</div>
			<div class="row options-row">
				<input type="checkbox" id="allowTies">
				<label for="allowTies" id="allowTiesLabel"></label>
				<input type="checkbox" id="anchorMain">
				<label for="anchorMain" id="anchorMainLabel"></label>
				<input type="checkbox" id="normalizeElo">
				<label for="normalizeElo" id="normalizeEloLabel"></label>
			</div>
			<h3 id="competitorsHeader"></h3>
			<div id="listHeaders" class="competitor-row">
				<label id="headName"></label>
				<label id="headWin"></label>
				<label id="headTie"></label>
				<label id="headElo"></label>
				<button class="hidden-btn" aria-hidden="true">×</button>
			</div>
			<div id="list"></div>
			<div class="row controls-row">
				<button id="add" class="secondary"></button>
				<button id="clear" class="secondary"></button>
				<button id="import" class="secondary"></button>
			</div>
			<input type="file" id="file" accept=".csvContent,.tsvContent,.txt" class="hidden">
			<span id="error" class="error hidden" aria-live="polite"></span>
			<button id="calculate" class="primary"></button>
		</div>
		<div id="results" class="hidden">
			<div class="actions">
				<button id="edit" class="secondary"></button>
				<button id="copy" class="secondary"></button>
				<button id="export" class="success"></button>
			</div>
			<div id="resultsTable"></div>
		</div>
	</div>
	<script>
		const text = {
			en: {
				title: 'EloCalc',
				subtitle: 'Convert between Win Rates and Elo Ratings',
				autoTheme: 'Auto Theme',
				lightTheme: 'Light',
				darkTheme: 'Dark',
				mainLabel: 'Main Contender',
				allowTiesLabel: 'Include Tie Rates',
				anchorMainLabel: 'Anchor Main to 1000',
				normalizeEloLabel: 'Normalize to 1000',
				competitorsHeader: 'Competitors',
				add: '+ Add Competitor',
				calculate: 'Calculate',
				edit: 'Edit Inputs',
				export: 'Export to CSV',
				copy: 'Copy Table',
				copySuccess: 'Copied!',
				import: 'Import CSV',
				clear: 'Clear All',
				clearConfirm: 'Are you sure you want to clear all competitors?',
				removeCompetitor: 'Remove Competitor',
				competitorPlaceholder: 'Competitor Name',
				winRatePlaceholder: 'Win % vs Main',
				tieRatePlaceholder: 'Tie % vs Main',
				eloPlaceholder: 'Elo Rating',
				alertCompetitors: 'Please add at least one competitor.',
				alertInvalidRate: 'Win rate and tie rate must be between 0-100, and their sum cannot exceed 100.',
				name: 'Name',
				winRate: 'Win Rate',
				tieRate: 'Tie Rate',
				effectiveScore: 'Expected Score',
				eloRating: 'Elo Rating',
				eloDifference: 'Elo Diff',
				relativeStrength: 'Relative Strength',
				resultsTitle: 'Results',
				infoText: 'Click any row to set it as the baseline. The 400-point rule: A 400-point difference equals ~91% expected win rate.',
				alertImport: 'Error importing file. Please ensure it is a valid CSV/TSV.',
				languageLabel: 'Language',
				themeLabel: 'Theme',
				modeLabel: 'Mode',
				modeWin: 'Win Rate -> Elo',
				modeElo: 'Elo -> Win Rate',
				rank: '#'
			},
			id: {
				title: 'EloCalc',
				subtitle: 'Konversi antara Tingkat Kemenangan dan Peringkat Elo',
				autoTheme: 'Tema Otomatis',
				lightTheme: 'Terang',
				darkTheme: 'Gelap',
				mainLabel: 'Pesaing Utama',
				allowTiesLabel: 'Sertakan Tingkat Seri',
				anchorMainLabel: 'Tetapkan Utama ke 1000',
				normalizeEloLabel: 'Normalisasi ke 1000',
				competitorsHeader: 'Kompetitor',
				add: '+ Tambah Kompetitor',
				calculate: 'Hitung',
				edit: 'Ubah Input',
				export: 'Ekspor ke CSV',
				copy: 'Salin Tabel',
				copySuccess: 'Tersalin!',
				import: 'Impor CSV',
				clear: 'Hapus Semua',
				clearConfirm: 'Apakah Anda yakin ingin menghapus semua kompetitor?',
				removeCompetitor: 'Hapus Kompetitor',
				competitorPlaceholder: 'Nama Kompetitor',
				winRatePlaceholder: 'Menang % vs Utama',
				tieRatePlaceholder: 'Seri % vs Utama',
				eloPlaceholder: 'Peringkat Elo',
				alertCompetitors: 'Harap tambahkan setidaknya satu kompetitor.',
				alertInvalidRate: 'Tingkat menang dan seri harus antara 0-100, dan jumlahnya tidak boleh melebihi 100.',
				name: 'Nama',
				winRate: 'Menang %',
				tieRate: 'Seri %',
				effectiveScore: 'Skor Harapan',
				eloRating: 'Peringkat Elo',
				eloDifference: 'Selisih Elo',
				relativeStrength: 'Kekuatan Relatif',
				resultsTitle: 'Hasil',
				infoText: 'Klik baris mana saja untuk menjadikannya acuan. Aturan 400 poin: Selisih 400 poin setara dengan ~91% tingkat menang yang diharapkan.',
				alertImport: 'Gagal mengimpor file. Pastikan format CSV/TSV valid.',
				languageLabel: 'Bahasa',
				themeLabel: 'Tema',
				modeLabel: 'Mode',
				modeWin: 'Tingkat Menang -> Elo',
				modeElo: 'Elo -> Tingkat Menang',
				rank: '#'
			}
		};
		const elements = new Proxy({},{ get: (_,identifier)=>document.getElementById(identifier) });
		const escape = string=>string.replace(/[&<>"']/g,character=>'&#' + character.charCodeAt(0) + ';');

		const parseCSV = text=>(
			(firstLine=>(
				(separator=>(
					(result=>(
						(result.currentCell || result.currentRow.length) && (
							result.currentRow.push(result.currentCell),
							(result.currentRow.length > 1 || result.currentRow[0].trim()) && result.rows.push(result.currentRow)
						),
						result.rows.map(row=>row.map(cell=>cell.trim()
							.replace(/^"|"$/g,'')
							.replace(/""/g,'"')))
					))(
						Array.from(text).reduce((accumulator,character,index)=>(
							accumulator.skip ? (accumulator.skip = false) : (
								character === '"' ? (accumulator.insideQuote = !accumulator.insideQuote) : undefined,
								(character === separator && !accumulator.insideQuote) ? (
									accumulator.currentRow.push(accumulator.currentCell),
									accumulator.currentCell = ''
								) : ((character === '\n' || character === '\r') && !accumulator.insideQuote) ? (
									(character === '\r' && text[index + 1] === '\n') && (accumulator.skip = true),
									accumulator.currentRow.push(accumulator.currentCell),
									(accumulator.currentRow.length > 1 || accumulator.currentRow[0].trim()) && accumulator.rows.push(accumulator.currentRow),
									accumulator.currentRow = [],
									accumulator.currentCell = ''
								) : (
									accumulator.currentCell += character
								)
							),
							accumulator
						), { rows: [], currentRow: [], currentCell: '', insideQuote: false, skip: false })
					)
				))(
					(stats=>stats.tabs >= stats.commas && stats.tabs > 0 ? '\t' : ',')(
						Array.from(firstLine).reduce((accumulator,character)=>(
							character === '"' ? (accumulator.inside = !accumulator.inside) :
							!accumulator.inside ? (character === ',' ? accumulator.commas++ : character === '\t' ? accumulator.tabs++ : undefined) : undefined,
							accumulator
						), { commas: 0, tabs: 0, inside: false })
					)
				)
			))(text.split('\n')[0])
		);

		class EloCalc {
			constructor() {
				this.competitors = Object.entries({
					'Player B': [65, 10, 1000],
					'Player C': [45, 15, 1200],
					'Player D': [30, 20, 800]
				}).map(([name,[winRate,tieRate,elo]],index)=>({ identifier: index + 1,name,winRate,tieRate,elo }));
				this.nextIndex = 4;
				this.data = null;
				this.allowTies = true;
				this.anchorMain = false;
				this.normalizeElo = false;
				this.mode = 'win';
				this.sortState = { field: 'eloRating', direction: -1 };
				this.setup();
				this.theme('auto');
				this.language = navigator.language?.startsWith('id') ? 'id' : 'en';
				this.lang(this.language);
				this.setMode('win');
			}

			setup() {
				return (
					elements.mode.innerHTML = '<option value="win"></option><option value="elo"></option>',
					elements.language.innerHTML = '<option value="en">English</option><option value="id">Bahasa Indonesia</option>',
					(handlers=>(
						Object.entries(handlers).forEach(([identifier,handler])=>elements[identifier].onclick = handler)
					))({
						add: ()=>this.add(),
						clear: ()=>this.clear(),
						calculate: ()=>this.calculate(),
						edit: ()=>this.display('input'),
						copy: ()=>this.copy(),
						export: ()=>this.export(),
						import: ()=>elements.file.click()
					}),
					elements.file.onchange = event=>this.load(event.target.files[0]),
					elements.input.oninput = event=>(
						this.error(),
						event.target.matches('.win-input, .tie-input') && this.validateRow(event.target.closest('.competitor-row'))
					),
					elements.language.onchange = event=>this.lang(event.target.value),
					elements.theme.onchange = event=>this.theme(event.target.value),
					elements.mode.onchange = event=>this.setMode(event.target.value),
					elements.allowTies.onchange = event=>(
						this.allowTies = event.target.checked,
						elements.headTie.classList.toggle('hidden', !this.allowTies),
						document.querySelectorAll('.tie-input').forEach(element=>element.classList.toggle('hidden',!this.allowTies)),
						document.querySelectorAll('.competitor-row').forEach(row=>this.validateRow(row))
					),
					elements.allowTies.checked = this.allowTies,
					elements.anchorMain.onchange = event=>(this.anchorMain = event.target.checked,this.calculate()),
					elements.anchorMain.checked = this.anchorMain,
					elements.normalizeElo.onchange = event=>(this.normalizeElo = event.target.checked,this.calculate()),
					elements.normalizeElo.checked = this.normalizeElo,
					document.onkeydown = event=>this.key(event),
					elements.resultsTable.addEventListener('click',event=>this.handleTableClick(event)),
					elements.resultsTable.addEventListener('keydown',event=>this.handleTableKey(event)),
					elements.list.onclick = event=>(
						(row=>(
							(event.target.matches('.danger') && row) && this.remove(+row.dataset.identifier)
						))(event.target.closest('.competitor-row'))
					),
					elements.list.onchange = event=>(
						(row=>(
							(competitor=>(
								competitor && this.updateCompetitor(competitor, event.target)
							))(row && this.competitors.find(competitor=>competitor.identifier === +row.dataset.identifier))
						))(event.target.closest('.competitor-row'))
					)
				);
			}

			key(event) {
				return (
					event.key === 'Enter' && (
						(event.ctrlKey || event.metaKey) ? this.calculate() :
						(event.target.matches('input') && event.target.closest('.competitor-row')) ? (
							event.preventDefault(),
							(row=>(
								(competitor=>(
									competitor && this.updateCompetitor(competitor, event.target),
									this.focusNext(event.target, row)
								))(this.competitors.find(competitor=>competitor.identifier === +row.dataset.identifier))
							))(event.target.closest('.competitor-row'))
						) : (event.target.matches('#mainName, #allowTies')) ? (
							event.preventDefault(),
							(firstInput=>firstInput ? firstInput.focus() : elements.add.focus())(elements.list.firstElementChild?.querySelector('input'))
						) : undefined
					)
				);
			}

			handleTableClick(event) {
				return (
					(header=>(
						header ? this.sortResults(header.dataset.sort) : (row=>row && this.setBaseline(row.dataset.identifier))(event.target.closest('tr[data-identifier]'))
					))(event.target.closest('th[data-sort]'))
				);
			}

			handleTableKey(event) {
				return (
					(event.key === 'Enter' || event.key === ' ') && (
						(header=>(
							header ? (event.preventDefault(),this.sortResults(header.dataset.sort)) : (row=>row && (event.preventDefault(),this.setBaseline(row.dataset.identifier)))(event.target.closest('tr[data-identifier]'))
						))(event.target.closest('th[data-sort]'))
					)
				);
			}

			updateCompetitor(competitor, target) {
				return (
					(value=>(
						target.classList.contains('name-input') ? (competitor.name = value) :
						target.classList.contains('win-input') ? this.updateRate(competitor, 'winRate', value, target) :
						target.classList.contains('tie-input') ? this.updateRate(competitor, 'tieRate', value, target) :
						target.classList.contains('elo-input') ? this.updateRate(competitor, 'elo', value, target) : undefined
					))(target.value)
				);
			}

			updateRate(competitor, property, value, target) {
				return (
					competitor[property] = value === '' ? '' : (parseFloat(value) || 0)
				);
			}

			focusNext(target, row) {
				return (
					target.type === 'text' ? target.nextElementSibling?.focus() :
					(target.classList.contains('win-input') && this.allowTies) ? target.nextElementSibling?.focus() :
					row.nextElementSibling ? row.nextElementSibling.querySelector('input')?.focus() :
					this.add()
				);
			}

			string(key) { return text[this.language]?.[key] ?? key; }
			format(value, options = {}) { return value.toLocaleString(this.language === 'id' ? 'id-ID' : 'en-US', options); }

			theme(themeName) {
				document.documentElement.className = themeName === 'auto' ? '' : themeName;
				elements.theme.value = themeName;
			}

			lang(language) {
				return (
					this.language = elements.language.value = document.documentElement.lang = language,
					Object.keys(text.en).forEach(key=>elements[key] && (elements[key].textContent = this.string(key))),
					this.updateLabels(),
					[...elements.theme.options].forEach(option=>option.textContent = this.string(option.value + 'Theme')),
					[['language','languageLabel'],['theme','themeLabel'],['mode','modeLabel']].forEach(([identifier,key])=>elements[identifier].setAttribute('aria-label',this.string(key))),
					this.renderCompetitors(),
					(!elements.results.classList.contains('hidden') && this.data) && this.renderResults()
				);
			}

			setMode(mode) {
				return (
					this.mode = mode,
					elements.input.className = `mode-${mode}`,
					elements.mode.value = mode,
					this.error(),
					this.renderCompetitors()
				);
			}

			updateLabels() {
				return (
					elements.headName.textContent = this.string('name'),
					elements.headWin.textContent = this.string('winRatePlaceholder'),
					elements.headTie.textContent = this.string('tieRatePlaceholder'),
					elements.headElo.textContent = this.string('eloPlaceholder'),
					[...elements.mode.options].forEach(option=>option.textContent = this.string(option.value === 'win' ? 'modeWin' : 'modeElo'))
				);
			}

			display(section) {
				return (
					['input','results'].forEach(identifier=>elements[identifier].classList.toggle('hidden',identifier !== section)),
					section === 'results' ? (elements.results.setAttribute('tabindex', '-1'), elements.results.focus()) : elements.mainName.focus()
				);
			}

			error(message) {
				return (
					elements.error.textContent = message || '',
					elements.error.classList.toggle('hidden', !message)
				);
			}

			add() {
				return (
					this.error(),
					this.competitors.push({ identifier: this.nextIndex++, name: '', winRate: '', tieRate: '', elo: '' }),
					this.renderCompetitors(),
					elements.list.lastElementChild?.querySelector('input')?.focus()
				);
			}

			clear() {
				return (
					confirm(this.string('clearConfirm')) && (
						this.competitors = [],
						this.renderCompetitors(),
						this.add(),
						this.error()
					)
				);
			}

			remove(identifier) {
				return (
					this.error(),
					(index=>(
						this.competitors = this.competitors.filter(competitor=>competitor.identifier !== identifier),
						this.renderCompetitors(),
						(target=>(
							target >= 0 ? elements.list.children[target]?.querySelector('.danger')?.focus() : elements.add.focus()
						))(Math.min(index, this.competitors.length - 1))
					))(this.competitors.findIndex(competitor=>competitor.identifier === identifier))
				);
			}

			renderCompetitors() {
				return (
					elements.headTie.classList.toggle('hidden', !this.allowTies),
					elements.list.innerHTML = this.competitors.map((competitor,index)=>(
						(invalid=>(
							`<div class="competitor-row" data-identifier="${competitor.identifier}">
								<input type="text" class="name-input" value="${escape(competitor.name)}" placeholder="${this.string('competitorPlaceholder')}" aria-label="${this.string('competitorPlaceholder')} ${index + 1}">
								<input type="number" class="win-input ${invalid}" value="${competitor.winRate}" placeholder="${this.string('winRatePlaceholder')}" min="0" max="100" step="0.1" aria-label="${this.string('winRatePlaceholder')} ${index + 1}">
								<input type="number" class="tie-input ${this.allowTies ? '' : 'hidden'} ${invalid}" value="${competitor.tieRate}" placeholder="${this.string('tieRatePlaceholder')}" min="0" max="100" step="0.1" aria-label="${this.string('tieRatePlaceholder')} ${index + 1}">
								<input type="number" class="elo-input" value="${competitor.elo}" placeholder="${this.string('eloPlaceholder')}" aria-label="${this.string('eloPlaceholder')} ${index + 1}">
								<button class="danger" aria-label="${this.string('removeCompetitor')} ${index + 1}">×</button>
							</div>`
						))(this.isInvalid(competitor) ? 'invalid' : '')
					)).join('')
				);
			}

			load(file) {
				return (
					(reader=>(
						reader.onload = event=>(
							(result=>(
								((()=>{
									try {
										return (rows=>(
											!rows.length ? this.error(this.string('alertImport')) : (
												(header=>(
													(find=>(
														(nameIndexInitial=>(
															(winIndexInitial=>(
																(tieIndexInitial=>(
																	(([nameIndex,winIndex])=>(
																		(nameIndex < 0 || winIndex < 0) ? this.error(this.string('alertImport')) : (
																			(isWinNum=>(
																				(hasHeader=>(
																					(competitors=>(
																						!competitors.length ? this.error(this.string('alertImport')) : (
																							this.competitors = competitors,
																							tieIndexInitial >= 0 && (this.allowTies = true, elements.allowTies.checked = true),
																							this.error(),
																							this.renderCompetitors(),
																							elements.file.value = ''
																						)
																					))((hasHeader ? rows.slice(1) : rows).map(cells=>(
																						cells[nameIndex] ? {
																							identifier: this.nextIndex++,
																							name: cells[nameIndex],
																							winRate: +((cells[winIndex] || '').replace(/,/g, '.').replace(/[^\d.]/g, '')) || 0,
																							tieRate: tieIndexInitial >= 0 ? (+((cells[tieIndexInitial] || '').replace(/,/g, '.').replace(/[^\d.]/g, '')) || 0) : 0
																						} : null
																					)).filter(Boolean))
																				))((find(/name|nama/i) >= 0 || find(/win|menang/i) >= 0) || !isWinNum)
																			))(!isNaN(parseFloat((header[winIndex] || '').replace(',', '.'))))
																		)
																	))(
																		(nameIndexInitial < 0 || winIndexInitial < 0) ? (
																			(isAllNumbers=>(
																				isAllNumbers ? (
																					(winIndex=>[1 - winIndex,winIndex])(header.findIndex(cell=>/^\d+$/.test(cell.replace(/[.,]/g,'').trim())))
																				) : [0, 1]
																			))(header.every(cell=>/^\d+$/.test(cell.replace(/[.,]/g,'').trim())))
																		) : [nameIndexInitial, winIndexInitial]
																	)
																))(find(/tie|seri/i))
															))(find(/win|menang/i))
														))(find(/name|nama/i))
													))(regularExpression=>header.findIndex(cell=>regularExpression.test(cell)))
												))(rows[0])
											)
										))(parseCSV(result));
									} catch (error) {
										return this.error(this.string('alertImport'));
									}
								})())
							))(event.target.result)
						),
						file && reader.readAsText(file)
					))(new FileReader())
				);
			}

			calculate() {
				return (
					this.error(),
					(mainName=>(
						this.competitors = this.competitors.filter(competitor=>
							competitor.name.trim() ||
							(this.mode === 'win' && (competitor.winRate > 0 || competitor.tieRate > 0)) ||
							(this.mode === 'elo' && competitor.elo !== '')
						),
						this.renderCompetitors(),
						(errorIdentifier=>(
							errorIdentifier ? this.error(this.string(errorIdentifier)) : this.performCalculation(mainName)
						))(
							!this.competitors.length ? 'alertCompetitors' :
							(this.mode === 'win' && this.hasInvalidRates()) ? 'alertInvalidRate' : null
						)
					))(elements.mainName.value.trim() || 'Main')
				);
			}

			hasInvalidRates() {
				return this.competitors.some(competitor=>(
					(tieRate=>tieRate < 0 || tieRate > 100 || +competitor.winRate < 0 || +competitor.winRate > 100 || +competitor.winRate + tieRate > 100)(this.allowTies ? +competitor.tieRate : 0)
				));
			}

			performCalculation(mainName) {
				return (
					(resultsData=>(
						(targetAverage=>(
							(closestResult=>(
								this.data = {
									results: resultsData.allResults.sort((resultA,resultB)=>resultB.eloRating - resultA.eloRating),
									allowTies: this.allowTies,
									baselineIdentifier: this.data?.baselineIdentifier && resultsData.allResults.find(result=>result.identifier === this.data.baselineIdentifier) ? this.data.baselineIdentifier : resultsData.baselineIdentifier,
									closestIdentifier: closestResult.identifier
								},
								this.sortState = { field: 'eloRating', direction: -1 },
								this.updateRelativeStats(),
								this.renderResults(),
								this.display('results')
							))(resultsData.allResults.reduce((closest,result)=>Math.abs(result.eloRating - targetAverage) < Math.abs(closest.eloRating - targetAverage) ? result : closest,resultsData.allResults[0]))
						))(resultsData.averageElo)
					))(
						this.mode === 'win' ? (
							(rawResults=>(
								(allResultsWithoutAdjustment=>(
									(rawAverage=>(
										(adjustment=>(
											allResultsWithoutAdjustment.forEach(result=>result.eloRating = result.rawElo + adjustment),
											{ allResults: allResultsWithoutAdjustment, baselineIdentifier: 'main', averageElo: rawAverage + adjustment }
										))(this.anchorMain ? 1000 : 1000 - rawAverage)
									))(allResultsWithoutAdjustment.reduce((totalElo,result)=>totalElo + result.rawElo,0) / allResultsWithoutAdjustment.length)
								))([{ name: mainName, rawElo: 0, isMain: true, identifier: 'main', winRate: 50, tieRate: 0 }, ...rawResults])
							))(this.competitors.map(competitor=>this.calculateRow(competitor)))
						) : (
							(allResultsInitial=>(
								allResultsInitial.length > 0 ? (
									(averageEloInitial=>(
										(adjustment=>(
											(this.normalizeElo && allResultsInitial.forEach(result=>result.eloRating += adjustment)),
											{ allResults: allResultsInitial, baselineIdentifier: allResultsInitial[0].identifier, averageElo: this.normalizeElo ? 1000 : averageEloInitial }
										))(1000 - averageEloInitial)
									))(allResultsInitial.reduce((totalElo,result)=>totalElo + result.eloRating,0) / allResultsInitial.length)
								) : { allResults: [], baselineIdentifier: null, averageElo: 0 }
							))(this.competitors.map(competitor=>({ name: competitor.name.trim() || `Competitor ${competitor.identifier}`,eloRating: parseFloat(competitor.elo) || 0,identifier: competitor.identifier })))
						)
					)
				);
			}

			updateRelativeStats() {
				return (
					this.data && (
						(results=>(
							(baselineCompetitor=>(
								(currentRank=>(
									this.processedResults = results.map((result,index)=>(
										(index === 0 || Math.round(result.eloRating) !== Math.round(results[index - 1].eloRating)) && (currentRank = index + 1),
										(stats=>({
											...result,
											rank: currentRank,
											...stats,
											displayWinRate: this.mode === 'win' ? result.winRate : stats.effectiveScore * 100
										}))(this.calculateRowStats(result, baselineCompetitor))
									))
								))(1)
							))(results.find(result=>result.identifier === this.data.baselineIdentifier) || results[0])
						))(this.data.results)
					)
				);
			}

			calculateRow(competitor) {
				return (
					(tieRate=>(
						(effectiveScore=>(
							(eloDifference=>({
								name: competitor.name.trim() || `Competitor ${competitor.identifier}`,
								rawElo: eloDifference,
								identifier: competitor.identifier,
								winRate: +competitor.winRate,
								tieRate
							}))(effectiveScore >= 1 ? 2000 : effectiveScore <= 0 ? -2000 : -400 * Math.log10(1 / effectiveScore - 1))
						))((+competitor.winRate + tieRate * 0.5) / 100)
					))(this.allowTies ? +competitor.tieRate : 0)
				);
			}

			calculateRowStats(result, baselineCompetitor) {
				return (
					(eloDifference=>({
						eloDifference,
						effectiveScore: 1 / (1 + Math.pow(10, -eloDifference / 400))
					}))(result.eloRating - baselineCompetitor.eloRating)
				);
			}

			isInvalid(competitor) {
				return this.mode !== 'elo' && (+competitor.winRate + (this.allowTies ? +competitor.tieRate : 0)) > 100;
			}

			validateRow(row) {
				return (
					(!row || this.mode === 'elo') ? (row && row.querySelectorAll('input').forEach(input=>input.classList.remove('invalid'))) : (
						(winInput=>(
							(tieInput=>(
								(winInput && tieInput) && (
									(invalid=>(
										winInput.classList.toggle('invalid', invalid),
										tieInput.classList.toggle('invalid', invalid && this.allowTies)
									))(this.isInvalid({ winRate: winInput.value, tieRate: tieInput.value }))
								)
							))(row.querySelector('.tie-input'))
						))(row.querySelector('.win-input'))
					)
				);
			}

			sortResults(field) {
				return (
					this.sortState.field === field ? (this.sortState.direction *= -1) : (this.sortState.field = field, this.sortState.direction = field === 'name' ? 1 : -1),
					this.renderResults()
				);
			}

			renderResults() {
				return (
					this.processedResults && (
						(baselineIdentifier=>(
							(maxElo=>(
								(field=>(
									(direction=>(
										(sortedResults=>(
											this.sortedResults = sortedResults,
											(header=>(
												(activeElement=>(
													(savedSort=>(
														(savedIdentifier=>(
															elements.resultsTable.innerHTML = `
																<h2>${this.string('resultsTitle')}</h2>
																<p class="info">${this.string('infoText')}</p>
																<div class="table-wrapper">
																	<table>
																		<thead>
																			<tr>
																				${header('eloRating', this.string('rank'))}
																				${header('name', this.string('name'))}
																				${header('displayWinRate', this.string('winRate'))}
																				${this.mode === 'win' ? header('tieRate', this.string('tieRate')) : ''}
																				${this.mode === 'win' ? header('effectiveScore', this.string('effectiveScore')) : ''}
																				${header('eloRating', this.string('eloRating'))}
																				${header('eloRating', this.string('relativeStrength'))}
																				${header('eloDifference', this.string('eloDifference'))}
																			</tr>
																		</thead>
																		<tbody>
																			${sortedResults.map((result,index)=>(
																				(isBaseline=>(
																					(isClosest=>(
																						`<tr class="${isBaseline ? 'highlight' : ''} ${isClosest ? 'avg-highlight' : ''}" style="cursor: pointer" data-identifier="${result.identifier}" tabindex="0" aria-selected="${isBaseline}">
																							<td>${result.rank}</td>
																							<td><strong>${escape(result.name)}</strong>${isClosest ? ' <span title="Closest to Average">~</span>' : ''}</td>
																							<td>${this.format(result.displayWinRate, { maximumFractionDigits: 1 })}%</td>
																							${this.mode === 'win' ? `<td>${this.format(result.tieRate || 0, { maximumFractionDigits: 1 })}%</td>` : ''}
																							${this.mode === 'win' ? `<td>${this.format(result.effectiveScore * 100, { maximumFractionDigits: 1 })}%</td>` : ''}
																							<td><strong>${Math.round(result.eloRating)}</strong></td>
																							<td><div class="bar-container" title="${Math.round(result.eloRating)}" aria-hidden="true"><div class="bar" style="width:${Math.max(0, result.eloRating / maxElo * 100)}%"></div></div></td>
																							<td>${result.eloDifference > 0 ? '+' : ''}${Math.round(result.eloDifference)}</td>
																						</tr>`
																					))(result.identifier === this.data.closestIdentifier && this.mode === 'elo')
																				))(result.identifier === baselineIdentifier)
																			)).join('')}
																		</tbody>
																	</table>
																</div>`,
															savedSort ? elements.resultsTable.querySelector(`th[data-sort="${savedSort}"]`)?.focus() : (savedIdentifier && elements.resultsTable.querySelector(`tr[data-identifier="${savedIdentifier}"]`)?.focus())
														))(activeElement ? activeElement.dataset.identifier : null)
													))(activeElement ? activeElement.dataset.sort : null)
												))(document.activeElement)
											))((key,label)=>(
												(active=>(
													(className=>(
														(ariaSort=>(
															`<th class="${className}" data-sort="${key}" tabindex="0" role="columnheader" aria-sort="${ariaSort}">${label}</th>`
														))(active ? (this.sortState.direction === 1 ? 'ascending' : 'descending') : 'none')
													))(active ? (this.sortState.direction === 1 ? 'sort-asc' : 'sort-desc') : '')
												))(this.sortState.field === key)
											))
										))([...this.processedResults].sort((resultA,resultB)=>(
											(valueA=>(
												(valueB=>(
													typeof valueA === 'string' ? direction * valueA.localeCompare(valueB) : direction * (valueA - valueB)
												))(resultB[field])
											))(resultA[field])
										)))
									))(this.sortState.direction)
								))(this.sortState.field)
							))(Math.max(...this.data.results.map(result=>result.eloRating),1))
						))(this.data.baselineIdentifier)
					)
				);
			}

			setBaseline(identifier) {
				return (
					this.data && (
						this.data.baselineIdentifier = isNaN(identifier) ? identifier : +identifier,
						this.updateRelativeStats(),
						this.renderResults()
					)
				);
			}

			generateTableText(separator) {
				return (
					this.sortedResults && (
						(results=>(
							(headers=>(
								(escapeValue=>(
									headers + '\n' + results.map(result=>(
										[
											result.rank,
											result.name,
											this.format(result.displayWinRate, { minimumFractionDigits: 1, maximumFractionDigits: 1 }),
											...(this.mode === 'win' ? [result.tieRate || 0] : []),
											...(this.mode === 'win' ? [this.format(result.effectiveScore * 100, { minimumFractionDigits: 1, maximumFractionDigits: 1 })] : []),
											Math.round(result.eloRating),
											Math.round(result.eloDifference)
										].map(escapeValue).join(separator)
									)).join('\n')
								))(value=>(
									(stringValue=>(
										(stringValue.includes(separator) || stringValue.includes('"') || stringValue.includes('\n')) ? `"${stringValue
											.replace(/"/g,'""')}"` : stringValue
									))(String(value))
								))
							))([
								this.string('rank'),
								this.string('name'),
								this.string('winRate'),
								...(this.mode === 'win' ? [this.string('tieRate')] : []),
								...(this.mode === 'win' ? [this.string('effectiveScore')] : []),
								this.string('eloRating'),
								this.string('eloDifference')
							].join(separator))
						))(this.sortedResults)
					)
				);
			}

			export() {
				return (
					(csvContent=>(
						csvContent && Object.assign(document.createElement('a'), { href: URL.createObjectURL(new Blob([csvContent], { type: 'text/csvContent' })), download: `elo_ratings_${new Date().toISOString().slice(0, 19).replace(/[T:]/g, '-')}.csvContent` }).click()
					))(this.generateTableText(','))
				);
			}

			copy() {
				return (
					(tsvContent=>(
						tsvContent && navigator.clipboard.writeText(tsvContent).then(()=>(
							(originalText=>(
								elements.copy.textContent = this.string('copySuccess'),
								setTimeout(()=>elements.copy.textContent = originalText,2000)
							))(elements.copy.textContent)
						))
					))(this.generateTableText('\t'))
				);
			}
		}
		new EloCalc();
	</script>
</body>
